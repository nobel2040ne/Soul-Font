<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — SoulFont</title>
  <link rel="stylesheet" href="https://unpkg.com/@sakun/system.css" />
  {% load static %}
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <link rel="stylesheet" href="{% static 'css/retro.css' %}">
  <style>
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
    @media (max-width: 520px) { .two { grid-template-columns: 1fr; } }
    .err { color: #000; font-weight: bold; font-size: 12px; }
  </style>
</head>
<body class="desktop">
  {% include 'pybo/_menubar.html' %}

  <div class="app">
    <div class="window app-window narrow">
      <div class="title-bar">
        <button aria-label="Close" class="close"></button>
        <h1 class="title">Create Account</h1>
      </div>
      <div class="separator"></div>

      <div class="window-pane">
        <h2 class="page-title">Create your account</h2>

        <form method="POST">
          {% csrf_token %}
          <div class="field-col">
            <label for="username">Username *</label>
            <input class="w100" id="username" type="text" name="username" placeholder="soulsoul" required>
            {% for e in form.username.errors %}<div class="err">{{ e }}</div>{% endfor %}
          </div>
          <div class="two">
            <div class="field-col">
              <label for="first_name">First name *</label>
              <input class="w100" id="first_name" type="text" name="first_name" placeholder="Gildong" required>
            </div>
            <div class="field-col">
              <label for="last_name">Last name</label>
              <input class="w100" id="last_name" type="text" name="last_name" placeholder="Hong">
            </div>
          </div>
          <div class="field-col">
            <label for="password1">Password *</label>
            <input class="w100" id="password1" type="password" name="password1" placeholder="Password" required>
          </div>
          <div class="field-col">
            <label for="password2">Confirm password *</label>
            <input class="w100" id="password2" type="password" name="password2" placeholder="Re-enter password" required>
          </div>
          <div class="right-row">
            <button type="submit" class="btn default">Create</button>
          </div>
        </form>

        <hr class="divider">
        <p class="muted">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
      </div>
    </div>
  </div>

  <script src="{% static 'js/retro.js' %}"></script>
</body>
</html>
