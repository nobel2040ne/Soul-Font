<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Reset — SoulFont</title>
  <link rel="stylesheet" href="https://unpkg.com/@sakun/system.css" />
  {% load static %}
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <link rel="stylesheet" href="{% static 'css/retro.css' %}">
</head>
<body class="desktop">
  {% include 'pybo/_menubar.html' %}

  <div class="app">
    <div class="window app-window narrow">
      <div class="title-bar">
        <button aria-label="Close" class="close"></button>
        <h1 class="title">Password Reset</h1>
      </div>
      <div class="separator"></div>

      <div class="window-pane" style="text-align:center;">
        <h2 class="page-title">Sorry!</h2>
        <p class="lede">Password reset is not supported yet.</p>
        <div class="center-row">
          <button class="btn default" onclick="navigateWithFade('{% url 'login' %}')">Back to Log In</button>
        </div>
      </div>
    </div>
  </div>

  <script src="{% static 'js/retro.js' %}"></script>
</body>
</html>
