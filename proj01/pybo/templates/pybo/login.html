<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — SoulFont</title>
  <link rel="stylesheet" href="https://unpkg.com/@sakun/system.css" />
  {% load static %}
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <link rel="stylesheet" href="{% static 'css/retro.css' %}">
</head>
<body class="desktop">
  {% include 'pybo/_menubar.html' %}

  <div class="app">
    <div class="window app-window narrow">
      <div class="title-bar">
        <button aria-label="Close" class="close"></button>
        <h1 class="title">Log In</h1>
      </div>
      <div class="separator"></div>

      <div class="window-pane">
        <h2 class="page-title">Sign in to SoulFont</h2>
        <p class="lede">Feel Your Font.</p>

        {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

        <form method="POST">
          {% csrf_token %}
          <div class="field-col">
            <label for="username">Username or email</label>
            <input class="w100" id="username" type="text" name="username" placeholder="soulsoul" required>
          </div>
          <div class="field-col">
            <label for="password">Password</label>
            <input class="w100" id="password" type="password" name="password" placeholder="••••••••" required>
          </div>
          <div class="right-row">
            <a class="btn" href="{% url 'pw_reset' %}">Forgot?</a>
            <button type="submit" class="btn default">Log In</button>
          </div>
        </form>

        <hr class="divider">
        <p class="muted">New here? <a href="{% url 'signup' %}">Create an account</a></p>
      </div>
    </div>
  </div>

  <script src="{% static 'js/retro.js' %}"></script>
</body>
</html>
