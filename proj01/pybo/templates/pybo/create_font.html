<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Font</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 50%, #ffdde1 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: opacity 0.7s ease-in-out;
        }
        h1 {
            margin-top: 40px;
            font-size: 2.5rem;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin: 40px 0;
            width: 90%;
            max-width: 900px;
        }
        .combined-box {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            width: 100%;
        }
        .half-box {
            flex: 1;
            min-width: 280px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
        }
        .half-box:first-child {
            border-right: 1px solid rgba(255, 255, 255, 0.3);
        }
        .half-box p {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            align-items: center;
        }
        .file-list a {
            width: 100%;
            text-decoration: none;
        }
        .file-button {
            width: 100%;
            min-height: 50px;
            padding: 0 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: rgba(255, 255, 255, 0.25);
            border: none;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .file-button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        .upload-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }
        .upload-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .upload-item label {
            width: 100px;
            font-size: 1rem;
            text-align: left;
            white-space: nowrap;
        }
        .file-input {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            color: #ffffff;
            cursor: pointer;
            font-size: 0.9rem;
            text-align: left;
            appearance: none;
            -webkit-appearance: none;
        }
        .file-input::file-selector-button {
            background: rgba(255, 255, 255, 0.3);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }
        .file-input::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        .create-button {
            margin-top: 30px;
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.3);
        }
        .hidden-csrf {
            display: none;
        }
        @media (max-width: 768px) {
            .combined-box {
                flex-direction: column;
            }
            .half-box:first-child {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            }
        }
    </style>
</head>
<body>
    <h1>Create Your Own Font</h1>
    <div class="container">
        <form action="{% url 'learning' %}" method="post" enctype="multipart/form-data" style="width: 100%;">
            {% csrf_token %}
            <div class="combined-box">
                <div class="half-box">
                    <p>Download Template</p>
                    <div class="file-list">
                        <a href="{% url 'download_template1' %}?file=1-uniform.png">
                            <button type="button" class="file-button">Template 1</button>
                        </a>
                        <a href="{% url 'download_template2' %}?file=2-uniform.png">
                            <button type="button" class="file-button">Template 2</button>
                        </a>
                        <a href="{% url 'download_template3' %}?file=3-uniform.png">
                            <button type="button" class="file-button">Template 3</button>
                        </a>
                    </div>
                </div>
                <div class="half-box">
                    <p>Upload Your Completed Template</p>
                    <div class="upload-list">
                        <div class="upload-item">
                            <label for="template1">Template 1</label>
                            <input id="template1" class="file-input" type="file" name="template1" required>
                        </div>
                        <div class="upload-item">
                            <label for="template2">Template 2</label>
                            <input id="template2" class="file-input" type="file" name="template2" required>
                        </div>
                        <div class="upload-item">
                            <label for="template3">Template 3</label>
                            <input id="template3" class="file-input" type="file" name="template3" required>
                        </div>
                    </div>
                </div>
            </div>
            <div style="display: flex; justify-content: center;">
                <button type="submit" class="file-button create-button">Create Font</button>
            </div>
        </form>
    </div>
</body>
</html>
